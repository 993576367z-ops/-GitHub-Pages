name: AI Webpack Auto Deploy

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "输入需求"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      # 🤖 AI生成代码
      - name: Generate Code
        run: |
          PROMPT="${{ github.event.inputs.prompt }}" node scripts/generate.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # 📦 构建
      - name: Build
        run: npm run build

      # 🚀 提交（触发部署）
      - name: Commit & Push
        run: |
          git config user.name "AI Bot"
          git config user.email "ai@bot.com"
          git add .
          git commit -m "AI build"
          git push

      - name: Done
        run: echo "🚀 已完成构建"

      # 5. 上传构建产物
      - name: Upload dist
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: dist
