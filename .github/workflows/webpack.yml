name: AI Webpack Auto Deploy

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "输入需求"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      # 🤖 AI生成代码
      - name: Generate Code
        run: node scripts/generate.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPT: ${{ github.event.inputs.prompt }}

      # 📦 构建
      - name: Build
        run: npm run build

      # 🚀 Deploy to GitHub Pages（推荐方式）
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      # 5. 上传构建产物
      - name: Upload dist
        uses: actions/upload-artifact@v3
        with:
          name: build-files
          path: dist
